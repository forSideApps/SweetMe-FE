name: Build & Deploy (Frontend)

on:
  push:
    branches: [main]

env:
  NGINX_IMAGE: ghcr.io/forsideapps/withstudy-nginx

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ── 1. Checkout ────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Login to GitHub Container Registry ──────────
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 3. Build frontend ────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Build frontend
        run: npm ci && npm run build

      # ── 4. Build & push nginx (with frontend dist baked in) ──
      - name: Build and push nginx
        run: |
          cp -r dist nginx/dist
          docker build -t ${{ env.NGINX_IMAGE }}:latest nginx/
          docker push ${{ env.NGINX_IMAGE }}:latest

      # ── 5. Deploy to EC2 ────────────────────────────────
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER:  ${{ github.actor }}
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_KEY }}
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            APP_DIR=/home/ubuntu/withstudy

            cd "$APP_DIR"
            git remote set-url origin https://github.com/forSideApps/WithStudy-FE.git
            git fetch origin main
            git reset --hard FETCH_HEAD

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose -f docker-compose.prod.yml pull nginx
            docker compose -f docker-compose.prod.yml up -d

            docker image prune -f
