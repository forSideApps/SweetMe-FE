server {
    listen 80;
    server_name sweetme.kro.kr;

    root  /usr/share/nginx/html;
    index index.html;

    # ── 보안 헤더 ────────────────────────────────────────────────────────────
    # Clickjacking 방지
    add_header X-Frame-Options "SAMEORIGIN" always;
    # MIME 스니핑 방지
    add_header X-Content-Type-Options "nosniff" always;
    # XSS 필터 (구형 브라우저)
    add_header X-XSS-Protection "1; mode=block" always;
    # Referrer 정책
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Permissions Policy: 불필요한 브라우저 기능 차단
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # HSTS: HTTPS 강제 (HTTP로만 운영 중이면 제거할 것)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP: 인라인 스크립트/외부 리소스 제어 (Vite 빌드 결과에 맞게 조정 필요)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    # 서버 버전 노출 차단 (nginx.conf의 http 블록에서도 설정 권장)
    server_tokens off;

    # ── gzip 압축 ────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── 정적 파일 캐싱 전략 ──────────────────────────────────────────────────
    # Vite 빌드 결과물: hash 포함 파일명 → 장기 캐싱
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # 보안 헤더 재선언 (location 블록은 상위 add_header를 상속받지 않음)
        add_header X-Content-Type-Options "nosniff" always;
    }

    # index.html: 캐시 금지 (SPA 라우팅 기준 파일)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
    }

    # robots.txt: 캐시 허용
    location = /robots.txt {
        expires 7d;
        add_header Cache-Control "public";
        log_not_found off;
    }

    # ── API 프록시 ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://app:21002;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        # API 응답에 캐시 방지
        add_header Cache-Control "no-store";
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
